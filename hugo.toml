baseURL = "https://igawa.io/"
locale = "ja"
title = "What's done is done"
theme = "PaperMod"
defaultContentLanguage = "ja"
hasCJKLanguage = false
summaryLength = 100
paginate = 10

[params]
  description = "Masayuki Igawa's blog"
  author = "Masayuki Igawa"
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowShareButtons = false
  ShowRssButtonInSectionTermList = true
  defaultTheme = "auto"
  DateFormat = "2006-01-02"
  ShowToc = true
  TocOpen = false
  comments = true

[params.homeInfoParams]
  Title = "What's done is done"
  Content = "About [Masayuki Igawa](https://www.linkedin.com/in/masayukig)"

[[params.socialIcons]]
  name = "twitter"
  url = "https://twitter.com/masayukig"

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/masayukig"

[[params.socialIcons]]
  name = "linkedin"
  url = "https://www.linkedin.com/in/masayukig"

[[params.socialIcons]]
  name = "flickr"
  url = "https://flickr.com/masayun"

[[params.socialIcons]]
  name = "instagram"
  url = "https://instagram.com/masayukig"

[[params.socialIcons]]
  name = "rss"
  url = "/index.xml"

[services]
  [services.googleAnalytics]
    id = 'G-M8ZXKW4C73'

[markup.goldmark.renderer]
  unsafe = true

[taxonomies]
  category = "categories"
  tag = "tags"

[permalinks]
  posts = "/posts/:year/:month/:slug/"

[menu]
  [[menu.main]]
    identifier = "archives"
    name = "Archives"
    url = "/archives/"
    weight = 10
  [[menu.main]]
    identifier = "categories"
    name = "Categories"
    url = "/categories/"
    weight = 20
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 30
